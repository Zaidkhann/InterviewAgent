<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Agent | MCP Swarm Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="url(#paint0_linear)"/>
                    <path d="M2 17L12 22L22 17" stroke="url(#paint1_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="url(#paint2_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="paint0_linear" x1="2" y1="7" x2="22" y2="7" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#4F46E5"/>
                            <stop offset="1" stop-color="#EC4899"/>
                        </linearGradient>
                        <linearGradient id="paint1_linear" x1="2" y1="19.5" x2="22" y2="19.5" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#4F46E5"/>
                            <stop offset="1" stop-color="#EC4899"/>
                        </linearGradient>
                        <linearGradient id="paint2_linear" x1="2" y1="14.5" x2="22" y2="14.5" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#4F46E5"/>
                            <stop offset="1" stop-color="#EC4899"/>
                        </linearGradient>
                    </defs>
                </svg>
                <h2>Swarm AI</h2>
            </div>
            
            <div class="control-panel">
                <h3>Interview Controls</h3>
                <p>Welcome to the Multi-Agent Interview Simulator.</p>
                
                <div class="settings-group">
                    <label>Candidate Name</label>
                    <input type="text" id="candidateName" value="Alex">
                </div>
                <div class="settings-group">
                    <label>Target Role</label>
                    <input type="text" id="candidateRole" value="Software Engineer">
                </div>

                <div class="action-buttons">
                    <button id="btnStart" class="btn btn-primary">Start Technical Screen</button>
                    <button id="btnHR" class="btn btn-secondary" disabled>Trigger HR Round</button>
                    <button id="btnEnd" class="btn btn-danger" disabled>End & Evaluate</button>
                    <button id="btnRecommend" class="btn btn-accent" disabled>Generate Roadmap</button>
                </div>
            </div>

            <div class="status-panel">
                <div class="indicator">
                    <span class="dot pulse"></span> <span id="statusText">System Ready</span>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container">
            <header class="chat-header">
                <div class="header-info">
                    <h1>Live Interview Session</h1>
                    <span class="session-id">Session: <span id="sessionIdDisplay">Not Started</span></span>
                </div>
            </header>

            <div class="chat-flow" id="chatFlow">
                <div class="message system-msg">
                    <div class="msg-content">Welcome! Configure the candidate details and press "Start Technical Screen" to initialize the orchestration agents.</div>
                </div>
            </div>
            
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="chatInput" placeholder="Type your answer here..." disabled rows="1"></textarea>
                    <button id="btnSend" class="btn-send" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals for JSON results -->
    <div id="resultModal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close-btn">&times;</span>
            <h2 id="modalTitle">Evaluation Results</h2>
            <pre id="modalBody"></pre>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
